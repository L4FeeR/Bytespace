name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      supabase_url:
        description: Supabase project URL
        required: false
        type: string
      supabase_anon_key:
        description: Supabase anon key
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

env:
  BASE_HREF: /${{ github.event.repository.name }}/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate build config
        env:
          SUPABASE_URL: ${{ inputs.supabase_url || vars.SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ inputs.supabase_anon_key || secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Set SUPABASE_URL and SUPABASE_ANON_KEY in repository variables/secrets, or provide them when running workflow_dispatch."
            exit 1
          fi

      - name: Build web app
        env:
          SUPABASE_URL: ${{ inputs.supabase_url || vars.SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ inputs.supabase_anon_key || secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --base-href "$BASE_HREF"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
